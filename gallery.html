<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gallery | Seaside Pavilion</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
</head>

<body>

<div class="page-shell">

<header class="site-header">
  <div class="header-wrap">
    <a class="brand" href="index.html">Seaside Pavilion</a>

    <nav class="site-nav">
      <a href="index.html">Home</a>
      <a href="packages.html">Packages</a>
      <a href="booking.html">Booking</a>
      <a href="policies.html">Policies</a>
      <a href="location.html">Location</a>
      <a class="active" href="gallery.html">Gallery</a>
    </nav>
  </div>
</header>

<main>
  
<section class="gallery">

<h2>Explore Our Place</h2>

<div class="gallery-tabs">
  <button class="tab active" data-filter="all">All</button>
  <button class="tab" data-filter="beach">Beach</button>
  <button class="tab" data-filter="pavilion">Pavilion</button>
  <button class="tab" data-filter="rooms">Rooms</button>
  <button class="tab" data-filter="amenities">Amenities</button>
</div>

<div class="gallery-grid">

  <!-- BEACH -->
  <div class="img-box beach"><img src="Photos/beach-front.jpg"></div>
  <div class="img-box beach"><img src="Photos/beach-front-2.jpg"></div>
  <div class="img-box beach"><img src="Photos/beach-front-3.jpg"></div>
  <div class="img-box beach"><img src="Photos/beach-water.jpg"></div>

  <!-- PAVILION -->
  <div class="img-box pavilion"><img src="Photos/pavilion-exterior.jpg"></div>
  <div class="img-box pavilion"><img src="Photos/exterior-pavillion.jpg"></div>
  <div class="img-box pavilion"><img src="Photos/pavilion-night.jpg"></div>

  <!-- ROOMS -->
  <div class="img-box rooms"><img src="Photos/interior-pavillion.jpg"></div>
  <div class="img-box rooms"><img src="Photos/interior-pavillion-2.jpg"></div>
  <div class="img-box rooms"><img src="Photos/interior-pavillion-twin-bed.jpg"></div>

  <!-- AMENITIES -->
  <div class="img-box amenities"><img src="Photos/kitchen-and-restroom.jpg"></div>
  <div class="img-box amenities"><img src="Photos/grill-area.jpg"></div>
  <div class="img-box amenities"><img src="Photos/outdoor-shower.jpg"></div>

</div>

</section>

</main>

<footer class="footer">
  <p>© 2026 Seaside Pavilion at Casa Lalusin</p>
</footer>

</div>

<!-- Lightbox -->
<div id="lightbox">
  <span class="close">&times;</span>
  <img id="lightbox-img">
  <span class="prev">&#10094;</span>
  <span class="next">&#10095;</span>
</div>

<script>
const images = document.querySelectorAll(".gallery img");
const lightbox = document.getElementById("lightbox");
const lightboxImg = document.getElementById("lightbox-img");

let currentIndex = 0;

// Lightbox click
images.forEach((img, index) => {
  img.addEventListener("click", () => {
    currentIndex = index;
    lightboxImg.src = img.src;
    lightbox.style.display = "flex";
    lightbox.style.opacity = "0";

    setTimeout(() => {
      lightbox.style.opacity = "1";
    }, 10);
  });
});

// Close
document.querySelector(".close").onclick = () => {
  lightbox.style.display = "none";
};

// Next
document.querySelector(".next").onclick = () => {
  currentIndex = (currentIndex + 1) % images.length;
  lightboxImg.src = images[currentIndex].src;
};

// Prev
document.querySelector(".prev").onclick = () => {
  currentIndex = (currentIndex - 1 + images.length) % images.length;
  lightboxImg.src = images[currentIndex].src;
};

// ✅ ADD THIS PART (scroll animation fix)
const observer = new IntersectionObserver(entries => {
  entries.forEach(entry => {
    if (entry.isIntersecting) {
      entry.target.classList.add("show");
    }
  });
});

images.forEach(img => {
  observer.observe(img);
});

const tabs = document.querySelectorAll(".tab");
const items = document.querySelectorAll(".img-box");

tabs.forEach(tab => {
  tab.addEventListener("click", () => {

    document.querySelector(".tab.active").classList.remove("active");
    tab.classList.add("active");

    const filter = tab.getAttribute("data-filter");

    items.forEach(item => {
      if (filter === "all" || item.classList.contains(filter)) {
        item.style.display = "block";
      } else {
        item.style.display = "none";
      }
    });

  });
});

</script>

</body>
</html>
