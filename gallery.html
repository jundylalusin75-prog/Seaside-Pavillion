<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Gallery | Seaside Pavilion</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<link rel="stylesheet" href="styles.css">

</head>

<body>

<div class="page-shell">

<header class="site-header">

<div class="header-wrap">

<a class="brand" href="index.html">Seaside Pavilion</a>

<nav class="site-nav">

<a href="index.html">Home</a>
<a href="packages.html">Packages</a>
<a href="booking.html">Booking</a>
<a href="policies.html">Policies</a>
<a href="location.html">Location</a>
<a class="active" href="gallery.html">Gallery</a>

</nav>

</div>

</header>

<main>

<section class="gallery">
  <h2>Explore Our Place</h2>

  <!-- Featured (BEST SHOTS) -->
  <div class="featured">
    <img src="Photos/kubo-lounge-beach-view.jpg" class="featured-img" alt="Kubo Beach View">
    <img src="Photos/beach-front.jpg" class="featured-img" alt="Beach Front">
  </div>

  <!-- Grid -->
  <div class="gallery-grid">
    <img src="Photos/beach-front-3.jpg" alt="Beach View">
    <img src="Photos/beach-front-4.jpg" alt="Beach View">
    <img src="Photos/beach-water.jpg" alt="Beach Water">

    <img src="Photos/pavilion-night.jpg" alt="Pavilion Night">
    <img src="Photos/exterior-pavilion.jpg" alt="Pavilion Exterior">
    <img src="Photos/exterior-pavilion-6.jpg" alt="Pavilion Area">

    <img src="Photos/camping-area.jpg" alt="Camping Area">
    <img src="Photos/camping-area-3.jpg" alt="Camping Area">

    <img src="Photos/interior-pavilion.jpg" alt="Interior Pavilion">
    <img src="Photos/interior-pavilion-twin-bed.jpg" alt="Room Interior">
    <img src="Photos/kitchen-and-restroom.jpg" alt="Kitchen">
    <img src="Photos/house-exterior.jpg" alt="House Exterior">
  </div>
</section>

<!-- Lightbox -->
<div id="lightbox">
  <span class="close">&times;</span>
  <img id="lightbox-img">
  <span class="prev">&#10094;</span>
  <span class="next">&#10095;</span>
</div>

</main>

<footer class="footer">

<p>© 2026 Seaside Pavilion at Casa Lalusin</p>

</footer>

</div>

<script>
const images = document.querySelectorAll(".gallery img");
const lightbox = document.getElementById("lightbox");
const lightboxImg = document.getElementById("lightbox-img");

let currentIndex = 0;

images.forEach((img, index) => {
  img.addEventListener("click", () => {
    currentIndex = index;
    lightboxImg.src = img.src;
    lightbox.style.display = "block";
  });
});

document.querySelector(".close").onclick = () => {
  lightbox.style.display = "none";
};

document.querySelector(".next").onclick = () => {
  currentIndex = (currentIndex + 1) % images.length;
  lightboxImg.src = images[currentIndex].src;
};

document.querySelector(".prev").onclick = () => {
  currentIndex = (currentIndex - 1 + images.length) % images.length;
  lightboxImg.src = images[currentIndex].src;
};
</script>
  
</body>
</html>
