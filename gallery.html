<body>

<div class="header-wrap">

<nav class="site-nav">

<main>

<section class="gallery">
  <h2>Explore Our Place</h2>

  <div class="featured">
    <div class="img-box">
      <img src="Photos/kubo-lounge-beach-view.jpg">
    </div>
    <div class="img-box">
      <img src="Photos/beach-front.jpg">
    </div>
  </div>

  <div class="gallery-grid">
    <img src="Photos/beach-front-3.jpg">
    <img src="Photos/beach-front-4.jpg">
    <img src="Photos/beach-front-5.jpg">
    <img src="Photos/beach-water.jpg">

    <img src="Photos/pavilion-night.jpg">
    <img src="Photos/pavilion-exterior.jpg">

    <img src="Photos/exterior-pavilion-2.jpg">
    <img src="Photos/exterior-pavilion-5.jpg">
    <img src="Photos/exterior-pavilion-6.jpg">

    <img src="Photos/camping-area.jpg">
    <img src="Photos/camping-area-2.jpg">
    <img src="Photos/camping-area-3.jpg">

    <img src="Photos/interior-pavilion.jpg">
    <img src="Photos/interior-pavilion-2.jpg">
    <img src="Photos/interior-pavilion-entrance.jpg">
    <img src="Photos/interior-pavilion-twin-bed.jpg">

    <img src="Photos/interior-hallway.jpg">
    <img src="Photos/kitchen-and-restroom.jpg">
    <img src="Photos/grill-area.jpg">

  </div>
</section>

<!-- Lightbox -->
<div id="lightbox">
  <span class="close">&times;</span>
  <img id="lightbox-img">
  <span class="prev">&#10094;</span>
  <span class="next">&#10095;</span>
</div>

</main>

<footer class="footer">

<p>© 2026 Seaside Pavilion at Casa Lalusin</p>

</footer>

</div>

<script>
// Lightbox (same as before)
const images = document.querySelectorAll(".img-box img");
const lightbox = document.getElementById("lightbox");
const lightboxImg = document.getElementById("lightbox-img");

let currentIndex = 0;

images.forEach((img, index) => {
  img.addEventListener("click", () => {
    currentIndex = index;
    lightboxImg.src = img.src;
    lightbox.style.display = "block";
  });
});

document.querySelector(".close").onclick = () => {
  lightbox.style.display = "none";
};

document.querySelector(".next").onclick = () => {
  currentIndex = (currentIndex + 1) % images.length;
  lightboxImg.src = images[currentIndex].src;
};

document.querySelector(".prev").onclick = () => {
  currentIndex = (currentIndex - 1 + images.length) % images.length;
  lightboxImg.src = images[currentIndex].src;
};

// Scroll animation
const observer = new IntersectionObserver(entries => {
  entries.forEach(entry => {
    if (entry.isIntersecting) {
      entry.target.classList.add("show");
    }
  });
});

document.querySelectorAll(".gallery img").forEach(img => {
  observer.observe(img);
});
</script>
  
</body>
</html>
